http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Captures project names dynamically from URLs
        # e.g., http://localhost:8081/api/my-auth-service/login
        location ~ ^/api/(?<project_name>[^/]+)(?<app_path>/.*)$ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Inject custom Tiramisu context headers
            proxy_set_header X-Tiramisu-Project $project_name;
            proxy_set_header X-Tiramisu-Path $app_path;

            # Points to the local Caffeine socket running in the same container
            proxy_pass http://unix:/var/run/tiramisu/caffeine.sock;
        }
    }
}